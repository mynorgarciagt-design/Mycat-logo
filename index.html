<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCatálogo - Digital</title>
    <!-- Librerías de React y Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs (Carga Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, updateDoc, doc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDr8hXHlEJpnXd1667kMet7_WExa4bG74U",
                authDomain: "mycatalogo-8ff18.firebaseapp.com",
                projectId: "mycatalogo-8ff18",
                storageBucket: "mycatalogo-8ff18.firebasestorage.app",
                messagingSenderId: "754386656212",
                appId: "1:754386656212:web:7a403200c60df71457d441",
                measurementId: "G-81X2KH1EYQ"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const finalAppId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : "mycatalogo-8ff18";
        const initialToken = (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) ? __initial_auth_token : null;

        // Exportar a global para React
        window.fb = { 
            auth, db, appId: finalAppId, collection, addDoc, onSnapshot, deleteDoc, 
            updateDoc, doc, serverTimestamp, writeBatch, signInAnonymously, 
            signInWithCustomToken, onAuthStateChanged, initialToken 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Cart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            Store: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/></svg>,
            Share: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" cy="21" x2="16.65" y2="16.65"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
            Loader: () => <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        };

        // --- LÓGICA DE NEGOCIO ---
        const parseSizes = (str) => {
            const sizes = new Set();
            let s = str.toLowerCase().replace(/y/g, ',');
            s.split(',').forEach(p => {
                p = p.trim();
                if (p.includes('al')) {
                    const r = p.split('al');
                    const start = parseInt(r[0]); const end = parseInt(r[1]);
                    if (!isNaN(start) && !isNaN(end)) for (let i = start; i <= end; i++) sizes.add(i);
                } else {
                    const v = parseInt(p); if (!isNaN(v)) sizes.add(v);
                }
            });
            return Array.from(sizes).sort((a,b) => a - b);
        };

        const getVariants = (desc) => {
            if (!desc) return [];
            const lines = desc.split('\n').map(l => l.trim()).filter(l => l);
            let variants = []; let colors = []; let globalSizes = [];
            lines.forEach(l => {
                const low = l.toLowerCase();
                if (low.includes('talla')) globalSizes = parseSizes(l.replace(/tallas?:/i, ''));
                else if (l.includes('/')) {
                    const pts = l.split('/'); const color = pts[0].trim();
                    const szs = parseSizes(pts.slice(1).join('/'));
                    szs.forEach(s => variants.push({ color, size: s }));
                } else if (/^\d{2,3}\s*[a-zA-Z]/.test(l) || low.includes('negro') || low.includes('blanco') || low.includes('azul') || low.includes('beige')) {
                    colors.push(l);
                }
            });
            if (colors.length > 0 && globalSizes.length > 0) {
                colors.forEach(c => globalSizes.forEach(s => variants.push({ color: c, size: s })));
            }
            return variants;
        };

        const extractProducts = (items, pageNum) => {
            const codes = []; const prices = [];
            items.forEach(it => {
                const t = it.text.trim();
                if (/^MM\d+/i.test(t)) codes.push({ ...it, text: t.toUpperCase() });
                else if (/Q\.?\s*(\d+)/i.test(t)) {
                    const m = t.match(/Q\.?\s*(\d+)/i);
                    prices.push({ ...it, price: parseFloat(m[1]) });
                }
            });
            return codes.map(c => {
                let bestP = 0; let bestPY = c.y + 20; let minDist = Infinity;
                prices.forEach(p => {
                    const d = Math.sqrt(Math.pow(c.x-p.x,2)+Math.pow(c.y-p.y,2));
                    if (d < minDist && d < 30) { minDist = d; bestP = p.price; bestPY = p.y; }
                });
                const descs = items.filter(it => it.y > c.y + 0.5 && it.y < bestPY + 0.5 && Math.abs(it.x - c.x) < 30 && !/^MM\d+/i.test(it.text) && !/Q\.?\s*(\d+)/i.test(it.text));
                descs.sort((a,b) => a.y - b.y);
                return { code: c.text, description: descs.map(d => d.text).join('\n'), price: bestP, x: c.x, y: c.y, pageNumber: pageNum };
            });
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [view, setView] = useState('store');
            const [products, setProducts] = useState([]);
            const [pages, setPages] = useState([]);
            const [hotspots, setHotspots] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [showShareModal, setShowShareModal] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [pin, setPin] = useState('');
            const [pinError, setPinError] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);
            const [ready, setReady] = useState(false);
            const clickTimeout = useRef(null);

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 300);
                    const { auth, db, appId, onAuthStateChanged, onSnapshot, collection, signInAnonymously, signInWithCustomToken, initialToken } = window.fb;
                    try {
                        if (initialToken) await signInWithCustomToken(auth, initialToken);
                        else await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { if (u) setReady(true); });
                    } catch (e) { console.error(e); }
                };
                init();
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { db, appId, onSnapshot, collection } = window.fb;
                const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), s => setProducts(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubPg = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'pages'), s => setPages(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.pageNumber - b.pageNumber)));
                const unsubH = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'hotspots'), s => setHotspots(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubP(); unsubPg(); unsubH(); };
            }, [ready]);

            const handleSecretClick = () => {
                if (clickTimeout.current) clearTimeout(clickTimeout.current);
                if (secretClicks + 1 >= 5) { setShowLoginModal(true); setSecretClicks(0); }
                else { setSecretClicks(prev => prev + 1); clickTimeout.current = setTimeout(() => setSecretClicks(0), 1000); }
            };

            const handleSearch = () => {
                const found = products.find(p => p.code.toLowerCase().includes(searchQuery.toLowerCase()));
                if (found && found.pageNumber) {
                    let idx = pages.findIndex(pg => pg.pageNumber === found.pageNumber);
                    if (idx !== -1) { if (idx % 2 !== 0) idx--; setCurrentIndex(Math.max(0, idx)); setSearchQuery(''); }
                } else { setSearchQuery('No encontrado'); setTimeout(() => setSearchQuery(''), 1500); }
            };

            if (!ready) return <div className="h-screen flex items-center justify-center text-[#007cc2]"><Icons.Loader /></div>;

            return (
                <div className="min-h-screen relative overflow-x-hidden">
                    <header className="bg-white shadow-sm p-3 md:p-4 flex justify-between items-center sticky top-0 z-30 border-b">
                        <div className="flex items-center gap-2 text-xl font-extrabold text-[#007cc2] cursor-pointer select-none" onClick={handleSecretClick}>
                            <Icons.Store /> MyCatálogo
                        </div>
                        <div className="flex-1 max-w-xs mx-4 hidden md:flex relative">
                            <input type="text" placeholder="Buscar código..." className="w-full border rounded-full py-1.5 px-4 text-sm focus:outline-none" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearch()} />
                            <button onClick={handleSearch} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></button>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setShowShareModal(true)} className="text-gray-400 hover:text-[#007cc2]"><Icons.Share /></button>
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2 bg-blue-50 text-[#007cc2] rounded-full">
                                <Icons.Cart />
                                {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">{cart.reduce((s,i)=>s+i.qty,0)}</span>}
                            </button>
                        </div>
                    </header>

                    <main className="p-4 max-w-6xl mx-auto">
                        {view === 'store' ? (
                            <FlipbookView pages={pages} products={products} hotspots={hotspots} currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} onAdd={(v) => setCart(prev => {
                                const ex = prev.find(x => x.id === v.id);
                                if (ex) return prev.map(x => x.id === v.id ? {...x, qty: x.qty+1} : x);
                                return [...prev, {...v, qty: 1}];
                            })} />
                        ) : (
                            <AdminView pages={pages} products={products} setView={setView} />
                        )}
                    </main>

                    {isCartOpen && <CartDrawer cart={cart} setCart={setCart} onClose={() => setIsCartOpen(false)} />}
                    {showShareModal && <ShareModal onClose={() => setShowShareModal(false)} />}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-xs text-center shadow-2xl">
                                <h3 className="font-bold text-lg mb-4">Acceso Admin</h3>
                                <input type="password" autoFocus className={`w-full border-2 p-3 rounded-2xl text-center text-xl mb-4 ${pinError ? 'border-red-500':'focus:border-[#007cc2]'}`} value={pin} onChange={e => setPin(e.target.value)} placeholder="PIN..." />
                                <div className="flex gap-2">
                                    <button onClick={() => {setShowLoginModal(false); setPinError(false); setPin('');}} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Cerrar</button>
                                    <button onClick={() => {if(pin==='1234'){setView('admin'); setShowLoginModal(false); setPin('');}else setPinError(true);}} className="flex-1 bg-[#007cc2] text-white py-3 rounded-xl font-bold">Entrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function FlipbookView({ pages, products, hotspots, currentIndex, setCurrentIndex, onAdd }) {
            const [activeH, setActiveH] = useState(null);
            if (pages.length === 0) return <div className="h-[60vh] flex flex-col items-center justify-center text-center opacity-50"><Icons.Store /><h2 className="text-2xl font-bold mt-4">¡Catálogo en preparación!</h2><p>Próximamente muchos estilos para toda la familia.</p></div>;
            
            const left = pages[currentIndex]; const right = currentIndex + 1 < pages.length ? pages[currentIndex + 1] : null;

            const renderH = (pg) => pg && hotspots.filter(h => h.pageId === pg.id).map(h => {
                const p = products.find(prod => prod.id === h.productId); if (!p) return null;
                const vars = getVariants(p.description);
                const grouped = vars.reduce((acc, v) => { if(!acc[v.color]) acc[v.color]=[]; acc[v.color].push(v.size); return acc; }, {});
                return (
                    <div key={h.id} className="absolute z-20" style={{ left: `calc(${h.x}% - 30px)`, top: `${h.y}%` }}>
                        <div onClick={(e) => {e.stopPropagation(); setActiveH(activeH === h.id ? null : h.id);}} className="bg-[#007cc2] text-white rounded-full p-2 shadow-lg border-2 border-white cursor-pointer hover:scale-110 transition animate-pulse-slow"><Icons.Cart /></div>
                        {activeH === h.id && (
                            <div className="absolute top-10 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-2xl border min-w-[160px] z-50 p-2 animate-in fade-in" onClick={e => e.stopPropagation()}>
                                <p className="text-[11px] font-bold text-gray-800 leading-none mb-1">{p.code}</p>
                                <p className="text-xs font-bold text-blue-600 mb-2">Q{p.price?.toFixed(2)}</p>
                                <div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar">
                                    {Object.entries(grouped).length > 0 ? Object.entries(grouped).map(([c, szs]) => (
                                        <div key={c} className="text-left border-t pt-1">
                                            <p className="text-[9px] font-bold text-gray-400 uppercase leading-none mb-1">{c}:</p>
                                            <div className="flex flex-wrap gap-1">
                                                {szs.map(s => <button key={s} onClick={() => {onAdd({id:`${p.id}_${c}_${s}`, code:p.code, color:c, size:s, price:p.price}); setActiveH(null);}} className="bg-blue-50 text-[#007cc2] text-[10px] font-extrabold px-2 py-1 rounded hover:bg-[#007cc2] hover:text-white">{s}</button>)}
                                            </div>
                                        </div>
                                    )) : <button onClick={() => {onAdd({id:p.id, code:p.code, color:'', size:'', price:p.price}); setActiveH(null);}} className="w-full bg-[#007cc2] text-white text-[10px] font-bold py-2 rounded">AGREGAR</button>}
                                </div>
                            </div>
                        )}
                    </div>
                );
            });

            return (
                <div className="flex flex-col items-center gap-6" onClick={() => setActiveH(null)}>
                    <div className="flex items-center justify-center gap-2 md:gap-4 w-full h-[70vh] md:h-[75vh]">
                        <button onClick={() => setCurrentIndex(Math.max(0, currentIndex-2))} disabled={currentIndex===0} className="p-2 disabled:opacity-10 text-gray-400"><Icons.ChevronLeft /></button>
                        <div className="flex bg-white shadow-2xl h-full w-full max-w-5xl rounded-2xl overflow-hidden border border-gray-200">
                            <div className="w-1/2 h-full border-r relative flex items-center justify-center bg-gray-50 overflow-hidden">
                                <img src={left.imageUrl} className="max-h-full object-contain pointer-events-none" />{renderH(left)}
                            </div>
                            <div className="w-1/2 h-full relative flex items-center justify-center bg-gray-50 overflow-hidden">
                                {right && <><img src={right.imageUrl} className="max-h-full object-contain pointer-events-none" />{renderH(right)}</>}
                            </div>
                        </div>
                        <button onClick={() => setCurrentIndex(Math.min(pages.length-1, currentIndex+2))} disabled={currentIndex+2 >= pages.length} className="p-2 disabled:opacity-10 text-gray-400"><Icons.ChevronRight /></button>
                    </div>
                    <div className="text-gray-400 text-xs font-bold bg-white px-4 py-1.5 rounded-full shadow-sm border border-gray-100">Vista: {currentIndex+1}-{right?currentIndex+2:currentIndex+1} de {pages.length}</div>
                </div>
            );
        }

        function AdminView({ pages, products, setView }) {
            const [loading, setLoading] = useState(false);
            const { db, appId, collection, addDoc, deleteDoc, doc, writeBatch } = window.fb;

            const upload = async (e) => {
                const f = e.target.files[0]; if (!f) return; setLoading(true);
                try {
                    const pdf = await pdfjsLib.getDocument(await f.arrayBuffer()).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const pg = await pdf.getPage(i); const vp = pg.getViewport({ scale: 0.8 });
                        const canvas = document.createElement('canvas'); canvas.width = vp.width; canvas.height = vp.height;
                        await pg.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                        const pgRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pages'), { imageUrl: canvas.toDataURL('image/jpeg', 0.6), pageNumber: pages.length + i });
                        const text = await pg.getTextContent();
                        const items = text.items.map(it => ({ text: it.str, x: (it.transform[4]/(vp.width/0.8))*100, y: (1-(it.transform[5]/(vp.height/0.8)))*100 })).filter(it => it.text.trim());
                        const ex = extractProducts(items, pages.length + i);
                        for (const p of ex) {
                            const pRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { ...p });
                            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'hotspots'), { pageId: pgRef.id, productId: pRef.id, x: p.x, y: p.y });
                        }
                    }
                } catch (err) { console.error(err); alert("Error al subir"); }
                setLoading(false);
            };

            return (
                <div className="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="font-extrabold text-2xl text-gray-800">Panel de Control</h2>
                        <button onClick={() => setView('store')} className="text-sm font-bold text-[#007cc2] hover:underline">Volver a Tienda</button>
                    </div>
                    <div className="bg-blue-50 border-2 border-dashed border-blue-200 p-10 rounded-2xl text-center mb-8">
                        <input type="file" id="pdf" className="hidden" onChange={upload} />
                        <label htmlFor="pdf" className="bg-[#007cc2] text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700 shadow-lg inline-flex items-center gap-2 transition-all active:scale-95">
                            {loading ? <Icons.Loader /> : <Icons.Plus />} {loading ? 'Procesando Catálogo...' : 'Cargar Nuevo Catálogo PDF'}
                        </label>
                        {pages.length > 0 && <button onClick={async () => {if(confirm("¿Borrar todo?")){const b=writeBatch(db);pages.forEach(p=>b.delete(doc(db,'artifacts',appId,'public','data','pages',p.id))); await b.commit();}}} className="block mx-auto mt-4 text-red-500 text-xs font-bold hover:underline">Limpiar Catálogo Actual</button>}
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4">
                        {pages.map(p => (
                            <div key={p.id} className="relative group bg-white p-2 rounded-xl border border-gray-100 shadow-sm">
                                <img src={p.imageUrl} className="rounded-lg mb-1" />
                                <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pages', p.id))} className="absolute top-3 right-3 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 shadow-lg transition-opacity"><Icons.Trash /></button>
                                <p className="text-[10px] text-center font-bold text-gray-400">Página {p.pageNumber}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function CartDrawer({ cart, setCart, onClose }) {
            const [step, setStep] = useState('cart');
            const [form, setForm] = useState({ name: '', phone: '', address: '' });
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            const send = async () => {
                const { addDoc, collection, db, appId, serverTimestamp } = window.fb;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), { ...form, items: cart, total, createdAt: serverTimestamp() });
                let msg = `*NUEVO PEDIDO*\n\n*Cliente:* ${form.name}\n*Tel:* ${form.phone}\n*Dirección:* ${form.address}\n\n*Productos:*\n`;
                cart.forEach(i => msg += `- ${i.qty}x ${i.code} [${i.color} / Talla ${i.size}] (Q${i.price})\n`);
                msg += `\n*TOTAL: Q${total.toFixed(2)}*`;
                window.open(`https://wa.me/50237733402?text=${encodeURIComponent(msg)}`);
                setCart([]); onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-end">
                    <div className="bg-white w-full max-w-sm h-full p-6 flex flex-col shadow-2xl animate-in slide-in-from-right duration-300">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h2 className="font-extrabold text-xl flex items-center gap-2 text-gray-800"><Icons.Cart /> Tu Pedido</h2>
                            <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded-full"><Icons.X /></button>
                        </div>
                        {step === 'cart' ? (
                            <>
                                <div className="flex-grow overflow-auto space-y-4 pr-2 custom-scrollbar">
                                    {cart.map(i => (
                                        <div key={i.id} className="flex justify-between items-center border-b border-gray-50 pb-3">
                                            <div className="flex-1">
                                                <p className="font-bold text-sm text-gray-800">{i.code}</p>
                                                <p className="text-[10px] text-gray-400 font-medium">{i.color} {i.size && `/ Talla ${i.size}`}</p>
                                                <p className="font-bold text-[#007cc2] mt-1 text-sm">Q{i.price?.toFixed(2)}</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <div className="flex border rounded-lg overflow-hidden bg-gray-50 items-center">
                                                    <button onClick={() => setCart(cart.map(x=>x.id===i.id?{...x,qty:Math.max(1,x.qty-1)}:x))} className="px-2 py-1 font-bold text-gray-500">-</button>
                                                    <span className="px-2 text-xs font-bold text-gray-700">{i.qty}</span>
                                                    <button onClick={() => setCart(cart.map(x=>x.id===i.id?{...x,qty:x.qty+1}:x))} className="px-2 py-1 font-bold text-gray-500">+</button>
                                                </div>
                                                <button onClick={() => setCart(cart.filter(x=>x.id!==i.id))} className="text-red-300 hover:text-red-500"><Icons.Trash /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {cart.length===0 && <div className="h-full flex flex-col items-center justify-center opacity-20"><Icons.Cart /><p className="font-bold mt-2">Carrito vacío</p></div>}
                                </div>
                                {cart.length > 0 && (
                                    <div className="pt-4 border-t mt-4">
                                        <div className="flex justify-between items-end mb-4"><span className="text-gray-400 font-bold">Total:</span><span className="text-2xl font-extrabold text-[#007cc2]">Q{total.toFixed(2)}</span></div>
                                        <button onClick={()=>setStep('form')} className="w-full bg-[#007cc2] text-white p-4 rounded-2xl font-extrabold hover:bg-blue-700 shadow-lg transition-all active:scale-95">Enviar a mi asesor(a)</button>
                                    </div>
                                )}
                            </>
                        ) : (
                            <form onSubmit={e=>{e.preventDefault(); send();}} className="space-y-4">
                                <h3 className="font-extrabold text-center text-gray-700 mb-6">Datos de Entrega</h3>
                                <input required placeholder="Nombre Completo" className="w-full border p-3.5 rounded-xl focus:border-[#007cc2] outline-none bg-gray-50" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                                <input required placeholder="Teléfono" className="w-full border p-3.5 rounded-xl focus:border-[#007cc2] outline-none bg-gray-50" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} />
                                <textarea required placeholder="Dirección Exacta" className="w-full border p-3.5 rounded-xl focus:border-[#007cc2] outline-none bg-gray-50 h-32" value={form.address} onChange={e=>setForm({...form,address:e.target.value})} />
                                <button type="submit" className="w-full bg-green-600 text-white p-4 rounded-2xl font-extrabold hover:bg-green-700 shadow-xl flex items-center justify-center gap-2 mt-6">Enviar Pedido WhatsApp</button>
                                <button type="button" onClick={()=>setStep('cart')} className="w-full text-gray-400 font-bold py-2 hover:text-gray-600">Volver al carrito</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        function ShareModal({ onClose }) {
            const [copied, setCopied] = useState(false); const link = window.location.href;
            const copy = () => { navigator.clipboard.writeText(link); setCopied(true); setTimeout(()=>setCopied(false), 2000); };
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" onClick={onClose}>
                    <div className="bg-white p-8 rounded-[40px] w-full max-w-sm text-center shadow-2xl relative animate-in zoom-in-95" onClick={e=>e.stopPropagation()}>
                        <button onClick={onClose} className="absolute right-6 top-6 text-gray-300"><Icons.X /></button>
                        <div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Share /></div>
                        <h3 className="font-extrabold text-2xl mb-2 text-gray-800">Compartir Catálogo</h3>
                        <p className="text-sm text-gray-500 mb-8 px-2">Envía este enlace por WhatsApp para que tus clientes puedan comprar.</p>
                        <div className="flex gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-100 mb-2">
                            <input readOnly value={link} className="flex-1 bg-transparent text-xs text-gray-400 outline-none px-2 font-medium overflow-hidden text-ellipsis" />
                            <button onClick={copy} className={`px-5 py-3 rounded-xl font-bold text-white transition-all shadow-md ${copied?'bg-green-500':'bg-[#007cc2]'}`}>{copied ? <Icons.Check /> : <Icons.Copy />}</button>
                        </div>
                        {copied && <p className="text-green-600 text-[10px] font-bold uppercase tracking-widest mt-2 animate-bounce">¡Copiado con éxito!</p>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
