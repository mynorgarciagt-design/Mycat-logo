        // --- COMPONENTE: AJUSTADOR MANUAL DE ICONOS ---
        function HotspotAdjuster({ page, products, hotspots, onClose }) {
            const [selectedProd, setSelectedProd] = useState(null);
            const { db, appId, collection, addDoc, updateDoc, doc } = window.fb;

            const pageProducts = products.filter(p => p.pageNumber === page.pageNumber && p.catalogId === page.catalogId);
            const pageHotspots = hotspots.filter(h => h.pageId === page.id);

            const handleImageClick = async (e) => {
                if (!selectedProd) {
                    alert("⚠️ Primero debes seleccionar (tocar) un producto en la lista de la derecha.");
                    return;
                }
                const rect = e.target.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;

                const existingH = pageHotspots.find(h => h.productId === selectedProd);
                if (existingH) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'hotspots', existingH.id), { x, y });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'hotspots'), {
                        pageId: page.id,
                        productId: selectedProd,
                        x, y,
                        catalogId: page.catalogId
                    });
                }
            };

            return (
                <div className="fixed inset-0 bg-black/95 z-[100] flex flex-col md:flex-row overflow-hidden animate-in fade-in">
                    <div className="p-4 flex justify-between items-center md:hidden bg-gray-900 border-b border-gray-800">
                        <h3 className="text-white font-bold text-sm">Ajustar Carritos - Pág {page.pageNumber}</h3>
                        <button onClick={onClose} className="text-white bg-red-500 px-4 py-1.5 rounded-full text-xs font-bold">Cerrar</button>
                    </div>
                    
                    <div className="flex-1 flex items-center justify-center p-4 overflow-auto relative">
                        <div className="relative inline-block max-w-full max-h-full shadow-2xl bg-white">
                            <img 
                                src={page.imageUrl} 
                                alt="Página a Ajustar" 
                                onClick={handleImageClick}
                                className="max-h-[85vh] w-auto cursor-crosshair relative z-10" 
                            />
                            {pageHotspots.map(h => {
                                const p = pageProducts.find(prod => prod.id === h.productId);
                                const isSelected = selectedProd === h.productId;
                                return (
                                    <div 
                                        key={h.id} 
                                        onClick={(e) => { e.stopPropagation(); setSelectedProd(h.productId); }}
                                        className={`absolute w-10 h-10 -ml-5 -mt-5 rounded-full flex items-center justify-center cursor-pointer transition-all shadow-xl border-[3px] ${isSelected ? 'bg-green-500 border-white scale-125 z-[60] animate-pulse' : 'bg-[#007cc2] border-white hover:scale-110 z-50 opacity-90 hover:opacity-100'}`}
                                        style={{left: `${h.x}%`, top: `${h.y}%`}}
                                        title={p ? p.code : 'Desconocido'}
                                    >
                                        <Icons.Cart />
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="w-full md:w-80 bg-white flex flex-col shadow-2xl z-10 h-72 md:h-full">
                        <div className="p-5 border-b hidden md:flex justify-between items-center bg-gray-50">
                            <h3 className="font-extrabold text-gray-800">Posición de Iconos</h3>
                            <button onClick={onClose} className="bg-red-500 text-white p-2 rounded-full hover:bg-red-600 transition"><Icons.X /></button>
                        </div>
                        <div className="p-4 bg-blue-50 text-xs text-blue-900 font-medium border-b border-blue-100 leading-relaxed">
                            <span className="font-extrabold block mb-1">Instrucciones:</span>
                            1️⃣ Toca un código en la lista.<br/>
                            2️⃣ Toca la foto para poner su icono.<br/>
                            <span className="text-gray-500 text-[10px] block mt-2">*Añade manuales en la pestaña 'Productos' si falta alguno.</span>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar bg-gray-50">
                            {pageProducts.length === 0 ? (
                                <p className="text-center text-sm text-gray-500 mt-10 font-bold">No hay productos aquí.</p>
                            ) : pageProducts.map(p => {
                                const hasIcon = pageHotspots.some(h => h.productId === p.id);
                                return (
                                    <button 
                                        key={p.id}
                                        onClick={() => setSelectedProd(p.id)}
                                        className={`w-full text-left p-3.5 rounded-xl border-2 transition-all flex justify-between items-center ${selectedProd === p.id ? 'border-green-500 bg-green-50 shadow-md transform scale-[1.02]' : 'border-white hover:border-blue-200 bg-white shadow-sm'}`}
                                    >
                                        <div>
                                            <p className={`font-extrabold text-lg ${selectedProd === p.id ? 'text-green-700' : 'text-gray-800'}`}>{p.code}</p>
                                            <p className="text-[11px] font-bold text-gray-400">Q{p.price}</p>
                                        </div>
                                        {hasIcon && <span className="text-white bg-green-500 p-1.5 rounded-full shadow-sm"><Icons.Check /></span>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function CatalogSelectionView({ catalogs, pages, onSelect }) {
            const getThumbnail = (catId) => {
                const catPages = pages.filter(p => p.catalogId === catId);
                if (catPages.length === 0) return null;
                const firstPage = catPages.find(p => p.pageNumber === 1) || catPages[0];
                return firstPage.coverImage || firstPage.imageUrl;
            };

            if (catalogs.length === 0) {
                return (
                    <div className="flex flex-col items-center justify-center h-[60vh] text-center opacity-50">
                        <Icons.Package />
                        <h2 className="text-2xl font-bold mt-4 text-gray-800">¡Catálogo en preparación!</h2>
                        <p className="text-gray-500">Próximamente muchos estilos para toda la familia.</p>
                    </div>
                );
            }

            return (
                <div className="py-8 w-full min-h-screen">
                    <h2 className="text-2xl md:text-4xl font-extrabold text-center text-gray-800 mb-10 tracking-wide">Descubre Nuestras Campañas</h2>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-8 max-w-[1600px] mx-auto px-2 md:px-6">
                        {catalogs.map(cat => (
                            <div key={cat.id} onClick={() => onSelect(cat.id)} className="cursor-pointer group flex flex-col items-center w-full">
                                <div className="bg-white p-1 md:p-2 rounded-2xl shadow-xl border-4 border-transparent group-hover:border-[#007cc2] transition-all transform group-hover:-translate-y-2 w-full aspect-[1/1.4] flex items-center justify-center overflow-hidden mb-4 relative">
                                    {getThumbnail(cat.id) ? (
                                        <img src={getThumbnail(cat.id)} className="w-full h-full object-cover rounded-xl" alt={cat.name} />
                                    ) : (
                                        <div className="flex flex-col items-center opacity-30 text-gray-800">
                                            <Icons.FileText />
                                            <span className="text-[10px] md:text-xs font-bold mt-2">Sin páginas</span>
                                        </div>
                                    )}
                                </div>
                                <h3 className="font-bold text-sm md:text-xl text-gray-800 group-hover:text-[#007cc2] transition text-center px-1 w-full truncate">{cat.name}</h3>
                                <button className="mt-2 md:mt-4 bg-blue-50 text-[#007cc2] text-xs md:text-sm font-bold py-2.5 px-6 md:py-3 md:px-10 rounded-full group-hover:bg-[#007cc2] group-hover:text-white transition shadow-sm w-full md:w-auto">
                                    Ver Catálogo
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [view, setView] = useState('store');
            
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            const [catalogs, setCatalogs] = useState([]);
            const [activeCatalogId, setActiveCatalogId] = useState('');
            const [showCatalogList, setShowCatalogList] = useState(true);

            const [products, setProducts] = useState([]);
            const [pages, setPages] = useState([]);
            const [hotspots, setHotspots] = useState([]);
            
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [showIndexMenu, setShowIndexMenu] = useState(false);
            
            const [showShareModal, setShowShareModal] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [globalMessage, setGlobalMessage] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            const [pin, setPin] = useState('');
            const [pinError, setPinError] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);
            const [ready, setReady] = useState(false);
            const clickTimeout = useRef(null);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return setTimeout(init, 300);
                    const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, initialToken } = window.fb;
                    try {
                        if (initialToken) await signInWithCustomToken(auth, initialToken);
                        else await signInAnonymously(auth);
                        
                        onAuthStateChanged(auth, (u) => { if (u) setReady(true); });
                    } catch (e) { 
                        console.error(e);
                        let errorText = "Error al conectar Firebase: " + e.message;
                        if (e.code === 'auth/api-key-not-valid') errorText = "La API Key es incorrecta. Revísala en el index.html.";
                        else if (e.code === 'auth/operation-not-allowed') errorText = "Habilita 'Anónimo' en Firebase Authentication -> Sign-in method.";
                        else if (e.code === 'auth/unauthorized-domain') errorText = "Agrega el dominio de Vercel (ej. mycat-logo.vercel.app) en Firebase Authentication -> Settings -> Authorized domains.";
                        setGlobalMessage({ title: "Error de Configuración", text: errorText, type: "error" });
                        setReady(true);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { db, appId, onSnapshot, collection, auth } = window.fb;
                if (!auth.currentUser) return;

                const unsubC = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'catalogs'), s => {
                    const cats = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.createdAt?.toMillis()||0) - (b.createdAt?.toMillis()||0));
                    setCatalogs(cats);
                    setActiveCatalogId(prev => {
                        if (!prev && cats.length > 0) return cats[0].id;
                        if (prev && !cats.find(c => c.id === prev) && cats.length > 0) return cats[0].id;
                        if (cats.length === 0) return '';
                        return prev;
                    });
                });

                const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), s => setProducts(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubPg = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'pages'), s => setPages(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.pageNumber - b.pageNumber)));
                const unsubH = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'hotspots'), s => setHotspots(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubP(); unsubPg(); unsubH(); unsubC(); };
            }, [ready]);

            useEffect(() => {
                if (view !== 'store' || showCatalogList || isCartOpen || showShareModal || showLoginModal || confirmDialog || globalMessage) return;

                const handleKeyDown = (e) => {
                    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;

                    const maxPages = pages.filter(p => p.catalogId === activeCatalogId || (!p.catalogId && catalogs.length === 0)).length;
                    const step = window.innerWidth < 768 ? 1 : 2;

                    if (e.key === 'ArrowRight' && currentIndex + step < maxPages) {
                        setCurrentIndex(prev => Math.min(maxPages - 1, prev + step));
                    } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
                        setCurrentIndex(prev => Math.max(0, prev - step));
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, showCatalogList, isCartOpen, showShareModal, showLoginModal, confirmDialog, globalMessage, currentIndex, pages, activeCatalogId, catalogs]);

            const handleSecretClick = () => {
                if (clickTimeout.current) clearTimeout(clickTimeout.current);
                if (secretClicks + 1 >= 5) { setShowLoginModal(true); setSecretClicks(0); }
                else { setSecretClicks(prev => prev + 1); clickTimeout.current = setTimeout(() => setSecretClicks(0), 1000); }
            };

            const currentPages = pages.filter(p => p.catalogId === activeCatalogId || (!p.catalogId && catalogs.length === 0)).sort((a,b) => a.pageNumber - b.pageNumber);
            const currentProducts = products.filter(p => p.catalogId === activeCatalogId || (!p.catalogId && catalogs.length === 0));
            const currentHotspots = hotspots.filter(h => h.catalogId === activeCatalogId || (!h.catalogId && catalogs.length === 0));
            const indexedPages = currentPages.filter(p => p.indexName);

            const handleSearch = () => {
                const found = currentProducts.find(p => p.code.toLowerCase().includes(searchQuery.toLowerCase()));
                if (found && found.pageNumber) {
                    let idx = currentPages.findIndex(pg => pg.pageNumber === found.pageNumber);
                    if (!isMobile && idx !== -1 && idx % 2 !== 0) idx--; 
                    if (idx !== -1) { 
                        setCurrentIndex(Math.max(0, idx)); 
                        setSearchQuery(''); 
                        setShowCatalogList(false); 
                    }
                } else { setSearchQuery('No encontrado'); setTimeout(() => setSearchQuery(''), 1500); }
            };

            if (!ready) return <div className="h-screen flex items-center justify-center text-[#007cc2]"><Icons.Loader /></div>;

            return (
                <div className="min-h-screen relative flex flex-col bg-[#f3f4f6]" onClick={() => setShowIndexMenu(false)}>
                    
                    {/* CABECERA (Tienda) */}
                    {view === 'store' && (
                        <header className="bg-white shadow-md p-3 md:p-4 flex justify-between items-center sticky top-0 z-30">
                            <div className="flex-1 flex items-center gap-2 text-xl font-extrabold text-[#007cc2] cursor-pointer select-none" onClick={handleSecretClick}>
                                <Icons.Store /> <span className="hidden sm:inline">MyCatálogo</span>
                            </div>
                            
                            {!showCatalogList && (
                                <div className="flex-2 flex justify-center items-center gap-2 md:gap-4 mx-4">
                                    <button 
                                        onClick={() => setShowCatalogList(true)} 
                                        className="text-xs md:text-sm font-bold text-white bg-[#0a192f] px-3 py-2 md:px-5 md:py-2.5 rounded-full shadow-md hover:bg-blue-900 transition whitespace-nowrap hidden md:block"
                                    >
                                        ⬅ Volver
                                    </button>

                                    <div className="flex-1 max-w-lg hidden md:flex relative">
                                        <input type="text" placeholder="Buscar código..." className="w-full border-2 border-gray-200 rounded-full py-2 px-5 text-sm focus:outline-none focus:border-[#007cc2] transition-colors" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearch()} />
                                        <button onClick={handleSearch} className="absolute right-4 top-1/2 -translate-y-1/2 text-[#007cc2] hover:scale-110 transition"><Icons.Search /></button>
                                    </div>

                                    <div className="relative">
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setShowIndexMenu(!showIndexMenu); }} 
                                            className="text-xs md:text-sm font-bold text-white bg-[#0a192f] px-3 py-2 md:px-5 md:py-2.5 rounded-full shadow-md hover:bg-blue-900 transition flex items-center gap-1 hidden md:flex"
                                        >
                                            Índice <Icons.ChevronDown />
                                        </button>
                                        
                                        {showIndexMenu && (
                                            <div className="absolute right-0 md:left-1/2 md:-translate-x-1/2 mt-2 w-56 bg-white rounded-xl shadow-2xl border border-gray-100 z-50 overflow-hidden animate-in fade-in slide-in-from-top-2">
                                                <div className="max-h-64 overflow-y-auto custom-scrollbar p-1">
                                                    {indexedPages.length > 0 ? indexedPages.map(p => (
                                                        <button 
                                                            key={p.id}
                                                            onClick={() => {
                                                                let idx = currentPages.findIndex(x => x.id === p.id);
                                                                if (!isMobile && idx % 2 !== 0) idx--;
                                                                setCurrentIndex(Math.max(0, idx));
                                                                setShowIndexMenu(false);
                                                            }}
                                                            className="w-full text-left px-3 py-2.5 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-[#007cc2] rounded-lg transition border-b border-gray-50 last:border-b-0"
                                                        >
                                                            {p.indexName}
                                                        </button>
                                                    )) : (
                                                        <p className="px-3 py-4 text-xs text-center text-gray-400">No hay secciones indexadas.</p>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                            
                            <div className="flex-1 flex items-center gap-2 md:gap-4 justify-end">
                                <button onClick={() => setShowShareModal(true)} className="text-gray-400 hover:text-[#007cc2]"><Icons.Share /></button>
                                <button onClick={() => setIsCartOpen(true)} className="relative p-2 bg-blue-50 text-[#007cc2] rounded-full hover:bg-blue-100 transition">
                                    <Icons.Cart />
                                    {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">{cart.reduce((s,i)=>s+i.qty,0)}</span>}
                                </button>
                            </div>
                        </header>
                    )}

                    {view === 'admin' && (
                        <header className="bg-white shadow-sm p-3 md:p-4 flex justify-between items-center sticky top-0 z-30 border-b">
                            <div className="flex items-center gap-2 text-xl font-extrabold text-gray-800">
                                Panel de Control
                            </div>
                            <button onClick={() => {setView('store'); setShowCatalogList(true);}} className="text-sm font-bold text-white bg-[#007cc2] px-4 py-2 rounded-full hover:bg-blue-700 transition shadow">
                                Volver a Tienda
                            </button>
                        </header>
                    )}

                    {view === 'store' && !showCatalogList && (
                        <div className="md:hidden bg-white p-3 border-b flex flex-wrap items-center gap-2 shadow-sm z-20">
                            <div className="flex w-full gap-2">
                                <button onClick={() => setShowCatalogList(true)} className="text-xs font-bold text-white bg-[#0a192f] px-3 py-2 rounded-full shadow whitespace-nowrap">
                                    ⬅ Volver
                                </button>
                                <div className="relative">
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setShowIndexMenu(!showIndexMenu); }} 
                                        className="text-xs font-bold text-white bg-[#0a192f] px-3 py-2 rounded-full shadow flex items-center gap-1"
                                    >
                                        Índice <Icons.ChevronDown />
                                    </button>
                                    
                                    {showIndexMenu && (
                                        <div className="absolute left-0 mt-2 w-56 bg-white rounded-xl shadow-2xl border border-gray-100 z-50 overflow-hidden animate-in fade-in slide-in-from-top-2">
                                            <div className="max-h-64 overflow-y-auto custom-scrollbar p-1">
                                                {indexedPages.length > 0 ? indexedPages.map(p => (
                                                    <button 
                                                        key={p.id}
                                                        onClick={() => {
                                                            let idx = currentPages.findIndex(x => x.id === p.id);
                                                            if (!isMobile && idx % 2 !== 0) idx--;
                                                            setCurrentIndex(Math.max(0, idx));
                                                            setShowIndexMenu(false);
                                                        }}
                                                        className="w-full text-left px-3 py-2.5 text-sm font-bold text-gray-600 hover:bg-blue-50 hover:text-[#007cc2] rounded-lg transition border-b border-gray-50 last:border-b-0"
                                                    >
                                                        {p.indexName}
                                                    </button>
                                                )) : (
                                                    <p className="px-3 py-4 text-xs text-center text-gray-400">No hay secciones indexadas.</p>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex-1 relative w-full mt-1">
                                <input type="text" placeholder="Buscar código..." className="w-full border rounded-full py-2 pl-4 pr-10 text-sm focus:outline-none focus:border-[#007cc2]" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearch()} />
                                <button onClick={handleSearch} className="absolute right-3 top-1/2 -translate-y-1/2 text-[#007cc2]"><Icons.Search /></button>
                            </div>
                        </div>
                    )}

                    <main className={`flex-grow flex flex-col w-full mx-auto ${view === 'store' && !showCatalogList ? 'max-w-full px-0' : 'max-w-[1800px] px-1 md:px-4'}`}>
                        {view === 'store' ? (
                            showCatalogList ? (
                                <CatalogSelectionView 
                                    catalogs={catalogs} 
                                    pages={pages} 
                                    onSelect={(catId) => {
                                        setActiveCatalogId(catId);
                                        setShowCatalogList(false);
                                        setCurrentIndex(0);
                                    }} 
                                />
                            ) : (
                                <FlipbookView 
                                    pages={currentPages} 
                                    products={currentProducts} 
                                    hotspots={currentHotspots} 
                                    currentIndex={currentIndex} 
                                    setCurrentIndex={setCurrentIndex} 
                                    isMobile={isMobile}
                                    onAdd={(v) => setCart(prev => {
                                        const ex = prev.find(x => x.id === v.id);
                                        if (ex) return prev.map(x => x.id === v.id ? {...x, qty: x.qty+1} : x);
                                        return [...prev, {...v, qty: 1}];
                                    })} 
                                />
                            )
                        ) : (
                            <div className="pt-6">
                                <AdminView 
                                    catalogs={catalogs} 
                                    activeCatalogId={activeCatalogId} 
                                    setActiveCatalogId={setActiveCatalogId} 
                                    pages={pages} 
                                    products={products} 
                                    hotspots={hotspots}
                                    setGlobalMessage={setGlobalMessage} 
                                    setConfirmDialog={setConfirmDialog} 
                                />
                            </div>
                        )}
                    </main>

                    {isCartOpen && <CartDrawer cart={cart} setCart={setCart} onClose={() => setIsCartOpen(false)} />}
                    {showShareModal && <ShareModal onClose={() => setShowShareModal(false)} />}
                    
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-xs text-center shadow-2xl">
                                <h3 className="font-extrabold text-xl mb-4 text-gray-800">Acceso Admin</h3>
                                <input type="password" autoFocus className={`w-full border-2 p-3 rounded-2xl text-center text-xl mb-6 ${pinError ? 'border-red-500':'focus:border-[#007cc2]'} outline-none`} value={pin} onChange={e => setPin(e.target.value)} placeholder="PIN..." />
                                <div className="flex gap-2">
                                    <button onClick={() => {setShowLoginModal(false); setPinError(false); setPin('');}} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-gray-700">Cerrar</button>
                                    <button onClick={() => {if(pin==='1234'){setView('admin'); setShowLoginModal(false); setPin('');}else setPinError(true);}} className="flex-1 bg-[#007cc2] text-white py-3 rounded-xl font-bold">Entrar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {globalMessage && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${globalMessage.type === 'error' ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-[#007cc2]'}`}>
                                    <Icons.AlertCircle />
                                </div>
                                <h3 className="font-bold text-xl mb-2">{globalMessage.title}</h3>
                                <p className="text-sm text-gray-600 mb-6 leading-relaxed">{globalMessage.text}</p>
                                <button onClick={() => setGlobalMessage(null)} className="w-full bg-[#007cc2] text-white py-3 rounded-xl font-bold transition hover:bg-blue-700">Entendido</button>
                            </div>
                        </div>
                    )}

                    {confirmDialog && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95">
                                <h3 className="font-bold text-xl mb-2 text-gray-800">{confirmDialog.title}</h3>
                                <p className="text-sm text-gray-600 mb-6">{confirmDialog.text}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-gray-700 hover:bg-gray-200 transition">Cancelar</button>
                                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold hover:bg-red-600 transition">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function FlipbookView({ pages, products, hotspots, currentIndex, setCurrentIndex, onAdd, isMobile }) {
            const [activeH, setActiveH] = useState(null);
            const [playingVideo, setPlayingVideo] = useState(null);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);

            useEffect(() => { setActiveH(null); }, [currentIndex]);
            
            const step = isMobile ? 1 : 2;

            const handleNext = () => setCurrentIndex(prev => Math.min(pages.length - 1, prev + step));
            const handlePrev = () => setCurrentIndex(prev => Math.max(0, prev - step));

            const onTouchStart = (e) => { setTouchEnd(null); setTouchStart(e.targetTouches[0].clientX); };
            const onTouchMove = (e) => setTouchEnd(e.targetTouches[0].clientX);
            const onTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchStart - touchEnd;
                if (distance > 50 && currentIndex < pages.length - 1) handleNext();
                if (distance < -50 && currentIndex > 0) handlePrev();
            };

            if (pages.length === 0) return <div className="flex-grow flex flex-col items-center justify-center text-center opacity-50"><Icons.Package /><h2 className="text-2xl font-bold mt-4 text-gray-800">¡Catálogo vacío!</h2></div>;
            
            const left = pages[currentIndex]; 
            const right = (!isMobile && currentIndex + 1 < pages.length) ? pages[currentIndex + 1] : null;

            const renderH = (pg) => pg && hotspots.filter(h => h.pageId === pg.id).map(h => {
                const p = products.find(prod => prod.id === h.productId); if (!p) return null;
                const vars = getVariants(p.description);
                const grouped = vars.reduce((acc, v) => { if(!acc[v.color]) acc[v.color]=[]; acc[v.color].push(v.size); return acc; }, {});
                
                return (
                    <div key={h.id} className="absolute z-20" style={{ left: `calc(${h.x}% - 24px)`, top: `${h.y}%`, transform: 'translateY(-50%)' }}>
                        <div onClick={(e) => {e.stopPropagation(); setActiveH(activeH === h.id ? null : h.id);}} className="bg-[#007cc2] text-white rounded-full p-2 md:p-3 shadow-xl border-2 border-white cursor-pointer hover:scale-110 transition animate-pulse-slow"><Icons.Cart /></div>
                        {activeH === h.id && (
                            <div className="absolute top-12 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-2xl border border-gray-100 min-w-[160px] z-50 p-2 animate-in fade-in" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-1">
                                    <p className="text-[12px] font-extrabold text-gray-800 leading-none">{p.code}</p>
                                    {p.youtubeUrl && (
                                        <button onClick={() => setPlayingVideo(p.youtubeUrl)} className="text-red-600 hover:scale-110 transition bg-red-50 p-1 rounded-full" title="Ver Video">
                                            <Icons.Play />
                                        </button>
                                    )}
                                </div>
                                <p className="text-sm font-bold text-[#007cc2] mb-3">Q{p.price?.toFixed(2)}</p>
                                <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                    {Object.entries(grouped).length > 0 ? Object.entries(grouped).map(([c, szs]) => (
                                        <div key={c} className="text-left border-t pt-2">
                                            <p className="text-[10px] font-extrabold text-gray-500 uppercase leading-none mb-1.5">{c}:</p>
                                            <div className="flex flex-wrap gap-1.5">
                                                {szs.map(s => <button key={s} onClick={() => {onAdd({id:`${p.id}_${c}_${s}`, code:p.code, color:c, size:s, price:p.price}); setActiveH(null);}} className="bg-blue-50 text-[#007cc2] text-xs font-bold px-2.5 py-1 rounded hover:bg-[#007cc2] hover:text-white transition">{s}</button>)}
                                            </div>
                                        </div>
                                    )) : <button onClick={() => {onAdd({id:p.id, code:p.code, color:'', size:'', price:p.price}); setActiveH(null);}} className="w-full bg-[#007cc2] text-white text-xs font-bold py-2.5 rounded hover:bg-blue-700 transition">AGREGAR AL CARRITO</button>}
                                </div>
                            </div>
                        )}
                    </div>
                );
            });

            return (
                <div className="flex flex-col flex-grow items-center justify-center relative w-full py-2 md:py-6" onClick={() => { setActiveH(null); }}>

                    <div className="relative flex items-center justify-center w-full flex-grow h-[70vh] md:h-[80vh] lg:h-[85vh] px-2 md:px-12 lg:px-20">
                        
                        <button onClick={handlePrev} disabled={currentIndex===0} className="absolute left-0 md:left-4 lg:left-8 z-10 p-2 md:p-4 disabled:opacity-10 text-[#007cc2] hover:bg-gray-100 transition bg-white rounded-full shadow-md border border-gray-100 hidden sm:block">
                            <Icons.ChevronLeft />
                        </button>
                        
                        <div className="flex bg-white shadow-2xl h-full w-full max-w-[1400px] rounded-lg md:rounded-xl overflow-hidden border border-gray-200" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                            <div className={`h-full flex items-center justify-center relative bg-white overflow-hidden p-1 md:p-3 lg:p-4 ${isMobile ? 'w-full' : 'w-1/2 border-r border-gray-100'}`}>
                                {left && (
                                    <div className="relative h-full max-w-full inline-block">
                                        <img src={left.imageUrl} className="h-full w-auto max-w-full object-contain pointer-events-none block" />
                                        {renderH(left)}
                                    </div>
                                )}
                            </div>
                            {!isMobile && (
                                <div className="w-1/2 h-full flex items-center justify-center relative bg-white overflow-hidden p-1 md:p-3 lg:p-4">
                                    {right && (
                                        <div className="relative h-full max-w-full inline-block">
                                            <img src={right.imageUrl} className="h-full w-auto max-w-full object-contain pointer-events-none block" />
                                            {renderH(right)}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <button onClick={handleNext} disabled={currentIndex + step >= pages.length} className="absolute right-0 md:right-4 lg:right-8 z-10 p-2 md:p-4 disabled:opacity-10 text-[#007cc2] hover:bg-gray-100 transition bg-white rounded-full shadow-md border border-gray-100 hidden sm:block">
                            <Icons.ChevronRight />
                        </button>

                    </div>

                    <div className="mt-2 text-gray-400 text-xs font-bold bg-white px-4 py-1.5 rounded-full shadow-sm border border-gray-100">
                        Página {currentIndex+1} {(!isMobile && right) ? `- ${currentIndex+2}` : ''} de {pages.length}
                    </div>

                    {playingVideo && <VideoModal videoUrl={playingVideo} onClose={() => setPlayingVideo(null)} />}
                </div>
            );
        }

        function AdminView({ catalogs, activeCatalogId, setActiveCatalogId, pages, products, hotspots, setGlobalMessage, setConfirmDialog }) {
            const [tab, setTab] = useState('pdf');
            const [loading, setLoading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [editingProduct, setEditingProduct] = useState(null);
            const [orders, setOrders] = useState([]);
            const [promptDialog, setPromptDialog] = useState(null);
            const [adjustingPage, setAdjustingPage] = useState(null);

            const { db, appId, collection, addDoc, deleteDoc, updateDoc, doc, writeBatch, onSnapshot, serverTimestamp } = window.fb;

            useEffect(() => {
                const unsubOrders = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (s) => setOrders(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0))));
                return () => unsubOrders();
            }, []);

            const currentPages = pages.filter(p => p.catalogId === activeCatalogId).sort((a,b) => a.pageNumber - b.pageNumber);
            const currentProducts = products.filter(p => p.catalogId === activeCatalogId);

            const handleFileSelect = (e) => {
                const f = e.target.files[0]; 
                if (!f) return; 

                setPromptDialog({
                    title: "Asigna un nombre a este catálogo",
                    placeholder: "Ej. Campaña 3",
                    onSubmit: (catName) => {
                        if (catName && catName.trim() !== '') {
                            processUpload(f, catName.trim());
                        }
                    }
                });
                e.target.value = '';
            };

            const processUpload = async (f, catName) => {
                setLoading(true); setUploadProgress(0);
                try {
                    const catRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'catalogs'), { name: catName, createdAt: serverTimestamp() });
                    const catId = catRef.id;
                    setActiveCatalogId(catId);

                    const pdfjsLib = window['pdfjs-dist/build/pdf'];
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                    
                    const pdf = await pdfjsLib.getDocument(await f.arrayBuffer()).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        setUploadProgress(Math.round((i / pdf.numPages) * 100));
                        const pg = await pdf.getPage(i); 
                        
                        const unscaledVp = pg.getViewport({ scale: 1.0 });
                        const vp = pg.getViewport({ scale: 0.8 });
                        const canvas = document.createElement('canvas'); canvas.width = vp.width; canvas.height = vp.height;
                        await pg.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                        
                        const pgRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pages'), { imageUrl: canvas.toDataURL('image/jpeg', 0.6), pageNumber: i, catalogId: catId });
                        
                        const text = await pg.getTextContent();
                        const items = text.items.map(it => ({ text: it.str, transform: it.transform, height: it.height })).filter(it => it.text.trim());
                        
                        const ex = extractProducts(items, i, unscaledVp);
                        for (const p of ex) {
                            const pRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { code: p.code, description: p.description, price: p.price, pageNumber: p.pageNumber, catalogId: catId });
                            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'hotspots'), { pageId: pgRef.id, productId: pRef.id, x: p.x, y: p.y, catalogId: catId });
                        }
                    }
                } catch (err) { 
                    console.error(err); 
                    setGlobalMessage({ title: "Error", text: "Hubo un error al procesar el archivo PDF: " + err.message, type: "error" });
                }
                setLoading(false); setUploadProgress(0);
            };

            const deleteActiveCatalog = async () => {
                if (!activeCatalogId) return;
                setConfirmDialog({
                    title: "¿Eliminar Catálogo?",
                    text: "Esta acción borrará de forma permanente todas las páginas y productos de ESTE catálogo seleccionado. Los demás se mantendrán intactos.",
                    onConfirm: async () => {
                        try {
                            const pagesToDelete = pages.filter(p => p.catalogId === activeCatalogId);
                            const productsToDelete = products.filter(p => p.catalogId === activeCatalogId);
                            const hotspotsToDelete = hotspots.filter(h => h.catalogId === activeCatalogId);

                            const toDelete = [
                                doc(db, 'artifacts', appId, 'public', 'data', 'catalogs', activeCatalogId),
                                ...pagesToDelete.map(p => doc(db, 'artifacts', appId, 'public', 'data', 'pages', p.id)),
                                ...productsToDelete.map(p => doc(db, 'artifacts', appId, 'public', 'data', 'products', p.id)),
                                ...hotspotsToDelete.map(h => doc(db, 'artifacts', appId, 'public', 'data', 'hotspots', h.id))
                            ];
                            
                            for (let i = 0; i < toDelete.length; i += 400) {
                                const b = writeBatch(db);
                                toDelete.slice(i, i + 400).forEach(d => b.delete(d));
                                await b.commit();
                            }
                            setActiveCatalogId('');
                        } catch (err) {
                            console.error(err);
                            setGlobalMessage({ title: "Error", text: "No se pudo borrar el catálogo completo.", type: "error" });
                        }
                    }
                });
            };

            const handleSetIndex = (page) => {
                setPromptDialog({
                    title: "Crear Índice de Sección",
                    text: "Asigna un nombre a esta página para que el cliente pueda navegar rápidamente (ej. Zapatos de Dama).",
                    placeholder: "Nombre de sección...",
                    defaultValue: page.indexName || '',
                    onSubmit: async (tagName) => {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pages', page.id), {
                                indexName: tagName.trim() === '' ? null : tagName.trim()
                            });
                        } catch(err) { console.error(err); }
                    }
                });
            };

            const handleSetCoverGIF = (page) => {
                setPromptDialog({
                    title: "Portada Animada (GIF)",
                    text: "Pega el enlace (URL) de una imagen o GIF animado. Se reemplazará la miniatura de esta página en la galería principal.",
                    placeholder: "https://ejemplo.com/mianimacion.gif",
                    defaultValue: page.coverImage || '',
                    onSubmit: async (url) => {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pages', page.id), {
                                coverImage: url.trim() === '' ? null : url.trim()
                            });
                        } catch(err) { console.error(err); }
                    }
                });
            };

            const handleAddManualProduct = () => {
                setPromptDialog({
                    title: "Añadir Producto Manualmente",
                    text: "¿En qué número de página del PDF se encuentra este producto?",
                    placeholder: "Ej. 5",
                    onSubmit: (pageNumStr) => {
                        const num = parseInt(pageNumStr);
                        if (!isNaN(num)) {
                            setEditingProduct({
                                id: 'new',
                                code: '',
                                description: '',
                                price: '',
                                pageNumber: num,
                                catalogId: activeCatalogId
                            });
                        }
                    }
                });
            };

            const updateProduct = async (e) => {
                e.preventDefault();
                try {
                    if (editingProduct.id === 'new') {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), {
                            code: editingProduct.code,
                            price: parseFloat(editingProduct.price),
                            description: editingProduct.description,
                            youtubeUrl: editingProduct.youtubeUrl || null,
                            pageNumber: editingProduct.pageNumber,
                            catalogId: activeCatalogId
                        });
                    } else {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingProduct.id), {
                            code: editingProduct.code,
                            price: parseFloat(editingProduct.price),
                            description: editingProduct.description,
                            youtubeUrl: editingProduct.youtubeUrl || null
                        });
                    }
                    setEditingProduct(null);
                } catch (err) { console.error(err); }
            };

            const handleDeleteProduct = (p) => {
                setConfirmDialog({
                    title: "¿Eliminar producto?",
                    text: `¿Seguro que deseas eliminar el producto ${p.code} permanentemente?`,
                    onConfirm: async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', p.id)); }
                });
            };

            const groupedProducts = currentProducts.reduce((acc, p) => {
                const pageKey = p.pageNumber || 'Sin Página';
                if (!acc[pageKey]) acc[pageKey] = [];
                acc[pageKey].push(p);
                return acc;
            }, {});

            return (
                <div className="bg-white p-4 md:p-8 rounded-[30px] shadow-2xl border border-gray-100 relative">
                    {promptDialog && <PromptModal dialog={promptDialog} onClose={() => setPromptDialog(null)} />}

                    <div className="flex flex-col md:flex-row items-start md:items-center justify-between bg-blue-50 p-4 rounded-2xl mb-8 gap-4">
                        <div className="flex items-center gap-3 w-full md:w-auto">
                            <span className="font-extrabold text-blue-900 text-sm">Gestionando Catálogo:</span>
                            {catalogs.length > 0 ? (
                                <select
                                    className="border-2 border-blue-200 rounded-xl text-sm font-bold text-[#007cc2] bg-white py-2 px-4 focus:outline-none cursor-pointer shadow-sm flex-1 md:flex-none"
                                    value={activeCatalogId}
                                    onChange={e => setActiveCatalogId(e.target.value)}
                                >
                                    {catalogs.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            ) : (
                                <span className="text-sm text-gray-500 font-medium">Ninguno disponible</span>
                            )}
                        </div>
                    </div>

                    <div className="flex gap-2 md:gap-4 border-b-2 border-gray-100 mb-8 overflow-x-auto pb-2 custom-scrollbar">
                        {['pdf', 'productos', 'pedidos'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={`capitalize whitespace-nowrap px-4 py-2 rounded-xl transition ${tab === t ? 'bg-[#007cc2] text-white font-bold shadow-md' : 'text-gray-500 font-semibold hover:bg-gray-50'}`}>
                                {t === 'pdf' ? 'Organizar Páginas' : t}
                            </button>
                        ))}
                    </div>

                    {tab === 'pdf' && (
                        <div>
                            <div className="bg-gray-50 border-2 border-dashed border-gray-300 p-8 md:p-12 rounded-3xl text-center mb-10 relative transition hover:border-[#007cc2] hover:bg-blue-50/50">
                                <input type="file" id="pdf" className="hidden" onChange={handleFileSelect} disabled={loading} />
                                <label htmlFor="pdf" className={`bg-[#007cc2] text-white px-8 py-4 rounded-full font-bold shadow-xl inline-flex items-center gap-2 transition-all text-lg ${loading ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-blue-700 hover:scale-105'}`}>
                                    {loading ? <Icons.Loader /> : <Icons.Plus />} {loading ? 'Procesando...' : 'Cargar Nuevo Catálogo PDF'}
                                </label>
                                
                                {loading && (
                                    <div className="mt-8 w-full max-w-md mx-auto">
                                        <div className="flex justify-between text-sm font-bold text-[#007cc2] mb-2">
                                            <span>Extrayendo páginas y códigos matemáticamente...</span>
                                            <span>{uploadProgress}%</span>
                                        </div>
                                        <div className="w-full bg-blue-200 rounded-full h-3 overflow-hidden shadow-inner">
                                            <div className="bg-[#007cc2] h-3 transition-all duration-300 ease-out rounded-full" style={{ width: `${uploadProgress}%` }}></div>
                                        </div>
                                    </div>
                                )}

                                {currentPages.length > 0 && !loading && <button onClick={deleteActiveCatalog} className="block mx-auto mt-8 text-red-500 text-sm font-bold hover:underline opacity-80 hover:opacity-100 transition">Eliminar este Catálogo Completo permanentemente</button>}
                            </div>
                            
                            {currentPages.length > 0 ? (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                                    {currentPages.map(p => (
                                        <div key={p.id} className="relative group bg-white p-2 rounded-2xl border-2 border-gray-100 shadow-sm hover:border-blue-200 transition">
                                            <div className="aspect-[1/1.4] overflow-hidden rounded-xl relative">
                                                <img src={p.coverImage || p.imageUrl} className="w-full h-full object-cover" />
                                                
                                                {p.indexName && (
                                                    <div className="absolute top-0 left-0 bg-[#007cc2] text-white text-[10px] font-bold px-2 py-1 rounded-br-lg shadow-sm z-10 flex items-center gap-1 max-w-full">
                                                        <Icons.Tag /> <span className="truncate">{p.indexName}</span>
                                                    </div>
                                                )}
                                                {p.coverImage && (
                                                    <div className="absolute bottom-2 left-2 bg-yellow-400 text-yellow-900 text-[9px] font-extrabold px-1.5 py-0.5 rounded shadow-sm z-10">
                                                        GIF ACTIVADO
                                                    </div>
                                                )}

                                                <div className="absolute inset-0 bg-gray-900/70 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center gap-2 transition-opacity z-20 backdrop-blur-sm">
                                                    <button onClick={() => handleSetIndex(p)} className="bg-white text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full shadow-lg hover:scale-105 transition flex items-center gap-1 w-3/4 justify-center"><Icons.Tag /> Índice</button>
                                                    <button onClick={() => handleSetCoverGIF(p)} className="bg-white text-yellow-600 text-[10px] font-bold px-3 py-1 rounded-full shadow-lg hover:scale-105 transition flex items-center gap-1 w-3/4 justify-center"><Icons.Star /> Portada</button>
                                                    <button onClick={() => setAdjustingPage(p)} className="bg-white text-green-600 text-[10px] font-bold px-3 py-1 rounded-full shadow-lg hover:scale-105 transition flex items-center gap-1 w-3/4 justify-center"><Icons.MapPin /> Iconos</button>
                                                    <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pages', p.id))} className="bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg hover:scale-105 transition flex items-center gap-1 w-3/4 justify-center"><Icons.Trash /> Borrar</button>
                                                </div>
                                            </div>
                                            <p className="text-xs text-center mt-3 font-extrabold text-gray-500">Página {p.pageNumber}</p>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center text-gray-400 py-20 flex flex-col items-center">
                                    <Icons.FileText />
                                    <p className="mt-4 font-medium">Este catálogo no tiene páginas aún.</p>
                                </div>
                            )}
                        </div>
                    )}

                    {tab === 'productos' && (
                        <div>
                            <div className="flex justify-end mb-6">
                                <button onClick={handleAddManualProduct} className="bg-green-600 text-white font-extrabold py-3 px-6 rounded-full hover:bg-green-700 transition shadow-lg flex items-center gap-2">
                                    <Icons.Plus /> Añadir Producto Manualmente
                                </button>
                            </div>

                            {editingProduct ? (
                                <div className="bg-white p-8 rounded-3xl border border-gray-100 shadow-2xl mb-8 max-w-xl mx-auto animate-in zoom-in-95">
                                    <h3 className="font-extrabold text-xl mb-6 flex items-center gap-2 text-[#007cc2]"><Icons.Edit2 /> {editingProduct.id === 'new' ? 'Añadir Producto' : 'Editar Detalle de Producto'}</h3>
                                    <form onSubmit={updateProduct} className="flex flex-col gap-5">
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider">Código de Sistema</label>
                                            <input type="text" className="w-full border-2 border-gray-200 p-3 rounded-xl mt-1 bg-gray-50 font-bold text-gray-800 focus:border-[#007cc2] outline-none transition" value={editingProduct.code || ''} onChange={e => setEditingProduct({...editingProduct, code: e.target.value})} required />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider">Descripción (Colores y Tallas)</label>
                                            <textarea className="w-full border-2 border-gray-200 p-3 rounded-xl mt-1 bg-gray-50 h-32 text-sm text-gray-700 focus:border-[#007cc2] outline-none transition custom-scrollbar" value={editingProduct.description || ''} onChange={e => setEditingProduct({...editingProduct, description: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider">Precio de Venta (Q)</label>
                                                <input type="number" step="0.01" className="w-full border-2 border-gray-200 p-3 rounded-xl mt-1 bg-blue-50 font-extrabold text-blue-700 focus:border-[#007cc2] outline-none transition" value={editingProduct.price || ''} onChange={e => setEditingProduct({...editingProduct, price: e.target.value})} required />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-red-400 uppercase tracking-wider flex items-center gap-1"><Icons.Play /> Enlace YouTube</label>
                                                <input type="url" placeholder="https://youtu.be/..." className="w-full border-2 border-gray-200 p-3 rounded-xl mt-1 bg-red-50 text-xs text-red-700 focus:border-red-400 outline-none transition" value={editingProduct.youtubeUrl || ''} onChange={e => setEditingProduct({...editingProduct, youtubeUrl: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="flex gap-4 mt-4">
                                            <button type="button" onClick={() => setEditingProduct(null)} className="bg-gray-100 text-gray-600 px-4 py-3.5 rounded-xl font-bold flex-1 hover:bg-gray-200 transition">Cancelar Edición</button>
                                            <button type="submit" className="bg-[#007cc2] text-white px-4 py-3.5 rounded-xl font-bold flex-1 hover:bg-blue-700 transition shadow-lg">Guardar Cambios</button>
                                        </div>
                                    </form>
                                </div>
                            ) : (
                                <div className="space-y-8">
                                    {Object.keys(groupedProducts).sort((a,b)=>a-b).map(pageNum => (
                                        <div key={pageNum} className="bg-white border border-gray-200 rounded-3xl overflow-hidden shadow-sm">
                                            <div className="bg-[#f8fafc] px-6 py-4 font-bold text-gray-800 border-b border-gray-200 flex justify-between items-center">
                                                <span className="text-lg">Productos detectados en Página {pageNum}</span>
                                                <span className="text-xs bg-white px-3 py-1.5 rounded-full text-[#007cc2] border border-blue-100 shadow-sm">{groupedProducts[pageNum].length} ítems</span>
                                            </div>
                                            <div className="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                                {groupedProducts[pageNum].map(p => (
                                                    <div key={p.id} className="p-5 border-2 border-transparent hover:border-blue-100 rounded-2xl bg-gray-50 relative group transition-all shadow-sm hover:shadow-md">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <p className="font-extrabold text-gray-900 text-xl flex items-center gap-1">
                                                                {p.code} 
                                                                {p.youtubeUrl && <span className="text-red-500 bg-red-100 p-1 rounded-full"><Icons.Play /></span>}
                                                            </p>
                                                            <p className="text-sm font-extrabold text-white bg-[#007cc2] px-2.5 py-1 rounded-lg shadow-sm">Q{p.price}</p>
                                                        </div>
                                                        <p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed mt-3">{p.description}</p>
                                                        <div className="absolute top-3 right-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => setEditingProduct(p)} className="bg-white text-[#007cc2] p-2 rounded-full shadow border hover:scale-110 transition"><Icons.Edit2 /></button>
                                                            <button onClick={() => handleDeleteProduct(p)} className="bg-white text-red-500 p-2 rounded-full shadow border hover:scale-110 transition"><Icons.Trash /></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                    {currentProducts.length === 0 && (
                                        <div className="text-center text-gray-400 py-20 flex flex-col items-center">
                                            <Icons.Package />
                                            <p className="mt-4 font-medium">Este catálogo aún no tiene productos extraídos.</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {tab === 'pedidos' && (
                        <div className="space-y-6">
                            {orders.map(o => (
                                <div key={o.id} className="p-6 border border-green-100 rounded-3xl bg-green-50/30 shadow-sm hover:shadow-md transition">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 border-b border-green-100 pb-4 gap-2">
                                        <div>
                                            <p className="font-extrabold text-xl text-gray-800">{o.name || o.customerName || 'Cliente Desconocido'}</p>
                                            <p className="text-xs text-gray-400 mt-1">{new Date(o.createdAt?.toDate()).toLocaleString()}</p>
                                        </div>
                                        <p className="font-extrabold text-[#128C7E] text-2xl bg-white px-4 py-2 rounded-2xl shadow-sm border border-green-50 self-end sm:self-auto">Q{o.total?.toFixed(2)}</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2 text-sm text-gray-600 bg-white p-4 rounded-2xl border border-gray-50">
                                            <p className="flex items-center gap-2"><Icons.Phone /> <span className="font-bold">{o.phone || o.customerPhone}</span></p>
                                            {(o.email || o.customerEmail) && <p className="flex items-center gap-2"><Icons.Mail /> <span>{o.email || o.customerEmail}</span></p>}
                                            <p className="flex items-start gap-2"><Icons.MapPin /> <span className="leading-snug">{o.address || o.customerAddress}</span></p>
                                        </div>
                                        <div className="bg-white p-4 rounded-2xl border border-gray-50">
                                            <p className="font-bold text-xs text-gray-400 uppercase tracking-wider mb-3">Detalle ({o.items?.length || 0} ítems):</p>
                                            <ul className="space-y-2 max-h-32 overflow-y-auto custom-scrollbar pr-2">
                                                {o.items?.map((i, idx) => (
                                                    <li key={idx} className="text-sm flex justify-between items-start border-b border-gray-50 pb-2 last:border-0 last:pb-0">
                                                        <div className="font-medium text-gray-700">
                                                            <span className="font-bold text-black">{i.qty}x</span> {i.code} 
                                                            <span className="text-xs text-gray-500 block mt-0.5">{(i.color || i.size) ? `${i.color} ${i.size ? `(Talla: ${i.size})` : ''}` : ''}</span>
                                                        </div>
                                                        <span className="text-gray-500 font-medium">Q{i.price}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {orders.length === 0 && (
                                <div className="text-center text-gray-400 py-20 flex flex-col items-center">
                                    <Icons.Cart />
                                    <p className="mt-4 font-medium">No has recibido pedidos nuevos por acá.</p>
                                </div>
                            )}
                        </div>
                    )}

                    {adjustingPage && (
                        <HotspotAdjuster 
                            page={adjustingPage} 
                            products={currentProducts} 
                            hotspots={hotspots} 
                            onClose={() => setAdjustingPage(null)} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
